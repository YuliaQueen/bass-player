name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

# Отменяем устаревшие прогоны на той же ветке (если запушил подряд)
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    frontend:
        name: Frontend (TS/Vite)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - run: npm ci
            - run: npm run lint
            - run: npm run format:check
            - run: npm run typecheck
            - run: npm test
            - run: npm run build

    backend:
        name: Backend (Laravel/Pest)
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        env:
            # SQLite in-memory — не нужен Postgres-сервис в CI для текущих тестов
            DB_CONNECTION: sqlite
            DB_DATABASE: ':memory:'
        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  extensions: mbstring, xml, pcntl, sqlite3, pdo_sqlite, intl
                  coverage: none

            - name: Cache Composer
              uses: actions/cache@v4
              with:
                  path: backend/vendor
                  key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
                  restore-keys: composer-${{ runner.os }}-

            - run: composer install --prefer-dist --no-interaction --no-progress

            - name: Prepare environment
              run: |
                  cp .env.example .env
                  php artisan key:generate

            - name: Pint (code style)
              run: ./vendor/bin/pint --test

            - name: PHPStan/Larastan
              run: ./vendor/bin/phpstan analyse --memory-limit=512M

            - name: Pest
              run: ./vendor/bin/pest
