name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

# Отменяем устаревшие прогоны на той же ветке (если запушил подряд)
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        name: Lint, typecheck, test, build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Lint (ESLint)
              run: npm run lint

            - name: Format check (Prettier)
              run: npm run format:check

            - name: Typecheck (tsc --noEmit)
              run: npm run typecheck

            - name: Test (Vitest)
              run: npm test

            - name: Build (Vite)
              run: npm run build
