<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bass Tabs Player</title>
        <link rel="stylesheet" href="/src/style.css" />
    </head>
    <body>
        <header class="topbar">
            <button
                id="toggle-sidebar"
                type="button"
                class="topbar-toggle"
                title="Скрыть/показать библиотеку"
            >
                ☰
            </button>
            <h1>Bass Tabs Player</h1>
            <span id="status" class="status">загрузка…</span>
        </header>

        <div class="controls">
            <button id="play" type="button" class="btn-primary">▶ Play</button>
            <button id="stop" type="button" class="btn-icon" title="Stop (в начало)">■</button>

            <div class="control-group">
                <label for="speed">Скорость</label>
                <input type="range" id="speed" min="0.25" max="1.5" step="0.05" value="1.0" />
                <span id="speed-value" class="control-value">1.00x</span>
            </div>

            <div class="control-group">
                <label for="volume">Громкость</label>
                <input type="range" id="volume" min="0" max="100" value="80" />
                <span id="volume-value" class="control-value">80%</span>
            </div>

            <div class="control-group">
                <label for="metronome">Метроном</label>
                <input type="range" id="metronome" min="0" max="100" value="0" />
                <span id="metronome-value" class="control-value">0%</span>
            </div>

            <label class="checkbox-control"> <input type="checkbox" id="show-tabs" checked /> Табы </label>

            <label class="checkbox-control"> <input type="checkbox" id="countin" /> Count-in </label>

            <label class="checkbox-control"> <input type="checkbox" id="loop-track" /> Loop трек </label>

            <div class="control-group loop-section">
                <label>Loop секции</label>
                <input type="number" id="loop-from" min="1" placeholder="от" class="bar-input" />
                <span class="dash">—</span>
                <input type="number" id="loop-to" min="1" placeholder="до" class="bar-input" />
                <button
                    id="loop-section-apply"
                    type="button"
                    class="btn-icon"
                    title="Зациклить секцию (или выдели мышью по партитуре)"
                >
                    ⟳
                </button>
                <button id="loop-section-reset" type="button" class="btn-icon" title="Сбросить секцию">
                    ×
                </button>
            </div>

            <span id="bar-position" class="bar-position">— / —</span>
        </div>

        <div class="progress" id="progress" title="Кликни для перемотки">
            <div class="progress-fill" id="progress-fill"></div>
        </div>

        <div class="layout" id="layout">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <strong>Библиотека</strong>
                    <button id="upload" type="button" class="btn-small">+ Файл</button>
                </div>
                <ul id="tabs-list" class="tabs-list"></ul>
            </aside>

            <main class="score-area">
                <div id="alphatab"></div>
            </main>
        </div>

        <input type="file" id="file-input" accept=".gp,.gp3,.gp4,.gp5,.gpx,.gp7,.gp8" multiple hidden />
        <div id="drop-overlay" hidden>
            <div class="drop-message">Отпустите .gp файл для загрузки</div>
        </div>

        <script type="module" src="/src/main.js"></script>
    </body>
</html>
